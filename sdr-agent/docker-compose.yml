version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdr
      POSTGRES_PASSWORD: sdrpass
      POSTGRES_DB: sdrdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
  pg_data:
